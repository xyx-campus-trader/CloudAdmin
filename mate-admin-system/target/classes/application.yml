server:
  port: 8082

spring:
  application:
    name: mate-admin-system
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mate_admin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  cache:
    type: redis

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

redisson:
  address: redis://127.0.0.1:6379
  database: 1
  connection-minimum-idle-size: 2
  connection-pool-size: 8

jwt:
  secret: CloudAdmin2026SecretKeyForJwtTokenGenerationAndValidation
  expiration: 604800

logging:
  level:
    com.mate: debug
